<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLHDMC — Ward Transfer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ──────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy   : #0d2137;
      --blue   : #1a4a7a;
      --teal   : #0f8a8a;
      --teal-lt: #e0f5f5;
      --green  : #27ae60;
      --red    : #e74c3c;
      --amber  : #f39c12;
      --white  : #ffffff;
      --gray-1 : #f4f7fa;
      --gray-2 : #e8edf3;
      --gray-3 : #b0bec5;
      --text   : #1a2633;
      --text-2 : #546e7a;
      --radius : 12px;
      --shadow : 0 4px 24px rgba(13,33,55,.10);
      --font   : 'Sarabun', sans-serif;
      --mono   : 'IBM Plex Mono', monospace;
    }

    /* ── Base ───────────────────────────────────── */
    body {
      font-family: var(--font);
      background: var(--gray-1);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 60px;
      gap: 16px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--teal);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text {
      font-size: 14px; font-weight: 600; color: var(--white); letter-spacing: .5px;
    }
    .logo-sub {
      font-size: 11px; color: var(--gray-3); font-weight: 400; margin-top: -2px;
    }
    .header-title {
      margin-left: auto;
      font-size: 13px; color: var(--gray-3);
      font-family: var(--mono);
    }

    /* ── Layout ─────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      background: var(--blue);
      color: var(--white);
      padding: 14px 20px;
      font-weight: 600;
      font-size: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 20px; }

    /* ── Search ─────────────────────────────────── */
    .search-row {
      display: flex; gap: 10px;
    }
    .search-input {
      flex: 1;
      border: 2px solid var(--gray-2);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      transition: border-color .2s;
      outline: none;
    }
    .search-input:focus { border-color: var(--teal); }
    .btn {
      border: none; cursor: pointer;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      border-radius: 8px; padding: 10px 20px;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--teal);  color: var(--white); }
    .btn-success { background: var(--green); color: var(--white); }
    .btn-ghost   { background: var(--gray-2); color: var(--text); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Patient List ───────────────────────────── */
    .patient-list { display: flex; flex-direction: column; gap: 10px; }

    .patient-card {
      border: 2px solid var(--gray-2);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex; align-items: center; gap: 14px;
    }
    .patient-card:hover { border-color: var(--teal); background: var(--teal-lt); }
    .patient-card.selected { border-color: var(--teal); background: var(--teal-lt); }

    .patient-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--blue); color: var(--white);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; flex-shrink: 0;
    }
    .patient-info { flex: 1; min-width: 0; }
    .patient-name { font-weight: 600; font-size: 15px; }
    .patient-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
    .patient-hn   { font-family: var(--mono); font-size: 12px; color: var(--text-2); }

    .ward-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .ward-badge.current { background: var(--teal); color: var(--white); }
    .ward-badge.initial { background: var(--gray-2); color: var(--text-2); }

    /* ── Update Form ────────────────────────────── */
    .selected-patient-banner {
      background: var(--navy);
      color: var(--white);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
    }
    .banner-name { font-weight: 600; font-size: 15px; }
    .banner-meta { font-size: 12px; color: var(--gray-3); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 600; color: var(--text-2); }

    select, input[type="text"] {
      border: 2px solid var(--gray-2);
      border-radius: 8px; padding: 10px 12px;
      font-family: var(--font); font-size: 15px; color: var(--text);
      outline: none; transition: border-color .2s;
      width: 100%;
    }
    select:focus, input[type="text"]:focus { border-color: var(--teal); }

    /* ── Transfer Log ───────────────────────────── */
    .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .log-table th {
      background: var(--gray-1); padding: 8px 12px;
      text-align: left; font-weight: 600; color: var(--text-2);
      border-bottom: 2px solid var(--gray-2);
    }
    .log-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--gray-2);
      vertical-align: middle;
    }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table .arrow { color: var(--teal); font-weight: 700; }

    /* ── States ─────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--text-2);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .alert {
      border-radius: 8px; padding: 12px 16px;
      font-size: 14px; font-weight: 500; margin-top: 12px;
    }
    .alert-success { background: #eafaf1; color: var(--green); border: 1px solid #a9dfbf; }
    .alert-error   { background: #fdf3f2; color: var(--red);   border: 1px solid #f5b7b1; }

    .loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-2); font-size: 14px; padding: 20px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--gray-2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tabs ───────────────────────────────────── */
    .tabs { display: flex; gap: 2px; background: var(--gray-1); border-radius: 10px; padding: 4px; }
    .tab-btn {
      flex: 1; padding: 8px; border: none; cursor: pointer;
      border-radius: 7px; font-family: var(--font); font-size: 14px; font-weight: 500;
      background: transparent; color: var(--text-2); transition: all .2s;
    }
    .tab-btn.active { background: var(--white); color: var(--teal); box-shadow: 0 1px 6px rgba(0,0,0,.08); font-weight: 600; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div>
      <div class="logo-text">SLHDMC</div>
      <div class="logo-sub">Palliative Care Team</div>
    </div>
  </div>
  <div class="header-title">Ward Transfer System</div>
</header>

<!-- ── Main ── -->
<main>

  <!-- ① Search Card -->
  <div class="card" id="searchCard">
    <div class="card-header">🔍 ค้นหาผู้ป่วยด้วย AN</div>
    <div class="card-body">
      <div class="search-row">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="พิมพ์เลข AN แล้วกด Enter..."
          autocomplete="off"
          inputmode="numeric"
        />
        <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">ค้นหา</button>
      </div>
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- ② Update + Log Card (hidden until patient selected) -->
  <div class="card" id="actionCard" style="display:none">
    <div class="card-header">
      <span id="actionCardTitle">📋 จัดการ Ward</span>
    </div>
    <div class="card-body">

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom:20px">
        <button class="tab-btn active" id="tab1" onclick="switchTab(1)">🔄 ย้าย Ward</button>
        <button class="tab-btn"        id="tab2" onclick="switchTab(2)">📜 ประวัติการย้าย</button>
      </div>

      <!-- Tab 1: Update Ward -->
      <div id="tabContent1">
        <div class="selected-patient-banner" id="patientBanner"></div>

        <div class="form-grid">
          <div class="form-group">
            <label>Ward ปัจจุบัน</label>
            <input type="text" id="currentWardDisplay" readonly style="background:var(--gray-1); color:var(--text-2);" />
          </div>

          <div class="form-group">
            <label>ย้ายไป Ward ใหม่ *</label>
            <select id="newWardSelect">
              <option value="">-- เลือก Ward --</option>
              <option value="ICU">ICU</option>
              <option value="CCU">CCU</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="อื่นๆ">อื่นๆ (กรอกเอง)</option>
            </select>
          </div>

          <div class="form-group" id="customWardGroup" style="display:none">
            <label>ระบุ Ward (อื่นๆ)</label>
            <input type="text" id="customWard" placeholder="เช่น ER, OPD..." />
          </div>

          <div class="form-group">
            <label>บันทึกโดย *</label>
            <input type="text" id="updatedByInput" placeholder="ชื่อผู้บันทึก" />
          </div>
        </div>

        <div style="margin-top:16px; display:flex; gap:10px; align-items:center">
          <button class="btn btn-success" id="saveBtn" onclick="saveWard()">💾 บันทึกการย้าย Ward</button>
          <button class="btn btn-ghost" onclick="clearSelection()">ยกเลิก</button>
        </div>
        <div id="saveAlert"></div>
      </div>

      <!-- Tab 2: Transfer Log -->
      <div id="tabContent2" style="display:none">
        <div id="logContent"></div>
      </div>

    </div>
  </div>

</main>

<script>
  // ═══════════════════════════════════════════════
  // CONFIG — แก้ตรงนี้หลัง deploy Apps Script แล้ว
  // ═══════════════════════════════════════════════
  const API_URL = 'https://script.google.com/macros/s/AKfycbyp96UR1JYXbRXtpxUSYf4bohn5bMIlI6EMezdFBmEv39FtdG8H1F9aHW-JTnSn2A1M/exec';

  // ═══════════════════════════════════════════════
  let selectedPatient = null;

  // ── Search ──────────────────────────────────────
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;

    const el = document.getElementById('searchResults');
    el.innerHTML = `<div class="loading"><div class="spinner"></div>กำลังค้นหา...</div>`;
    document.getElementById('searchBtn').disabled = true;

    try {
      const res  = await fetch(`${API_URL}?action=search&q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!data.success) {
        el.innerHTML = `<div class="alert alert-error" style="margin-top:12px">⚠️ ${data.message}</div>`;
        return;
      }

      if (data.count === 0) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>ไม่พบผู้ป่วย AN "<strong>${q}</strong>"</p>
          </div>`;
        return;
      }

      renderPatientList(data.patients);
    } catch (err) {
      el.innerHTML = `<div class="alert alert-error" style="margin-top:12px">❌ เชื่อมต่อ API ไม่ได้: ${err.message}</div>`;
    } finally {
      document.getElementById('searchBtn').disabled = false;
    }
  }

  function renderPatientList(patients) {
    const html = patients.map(p => {
      const initials  = (p.name || '?').slice(0, 2);
      const wardNow   = p.currentWard || p.wardInitial || '-';
      const isUpdated = !!p.currentWard;
      return `
        <div class="patient-card" id="pc-${p.hn}" onclick="selectPatient(${JSON.stringify(p).replace(/"/g, '&quot;')})">
          <div class="patient-avatar">${initials}</div>
          <div class="patient-info">
            <div class="patient-name">${p.name}</div>
            <div class="patient-meta">
              <span>HN: <span class="patient-hn">${p.hn}</span></span>
              <span>AN: <span class="patient-hn">${p.an}</span></span>
              <span>${p.gender || ''} | อายุ ${p.age || '-'}</span>
              <span>Admit: ${formatDate(p.admitDate)}</span>
            </div>
          </div>
          <div>
            <div class="ward-badge ${isUpdated ? 'current' : 'initial'}">
              ${isUpdated ? '📍' : '🏥'} ${wardNow}
            </div>
            ${isUpdated ? `<div style="font-size:10px;color:var(--text-2);text-align:right;margin-top:4px">อัปเดต ${p.updatedAt}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    document.getElementById('searchResults').innerHTML =
      `<div class="patient-list" style="margin-top:14px">${html}</div>`;
  }

  // ── Select Patient ───────────────────────────────
  function selectPatient(p) {
    selectedPatient = p;

    // Highlight selected card
    document.querySelectorAll('.patient-card').forEach(c => c.classList.remove('selected'));
    const card = document.getElementById(`pc-${p.hn}`);
    if (card) card.classList.add('selected');

    // Fill banner
    const wardNow = p.currentWard || p.wardInitial || '-';
    document.getElementById('patientBanner').innerHTML = `
      <div class="patient-avatar" style="background:var(--teal)">${p.name.slice(0,2)}</div>
      <div>
        <div class="banner-name">${p.name}</div>
        <div class="banner-meta">HN: ${p.hn} | AN: ${p.an} | Ward เริ่มต้น: ${p.wardInitial || '-'}</div>
      </div>
    `;

    // Fill form
    document.getElementById('currentWardDisplay').value = wardNow;
    document.getElementById('newWardSelect').value       = '';
    document.getElementById('customWard').value          = '';
    document.getElementById('saveAlert').innerHTML       = '';

    document.getElementById('actionCard').style.display = '';
    document.getElementById('actionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

    switchTab(1);
  }

  function clearSelection() {
    selectedPatient = null;
    document.getElementById('actionCard').style.display = 'none';
    document.querySelectorAll('.patient-card').forEach(c => c.classList.remove('selected'));
  }

  // ── Ward Dropdown ────────────────────────────────
  document.getElementById('newWardSelect').addEventListener('change', function() {
    document.getElementById('customWardGroup').style.display =
      this.value === 'อื่นๆ' ? '' : 'none';
  });

  // ── Save Ward ────────────────────────────────────
  async function saveWard() {
    if (!selectedPatient) return;

    let newWard = document.getElementById('newWardSelect').value;
    if (newWard === 'อื่นๆ') newWard = document.getElementById('customWard').value.trim();
    const updatedBy = document.getElementById('updatedByInput').value.trim();

    if (!newWard)    return showAlert('saveAlert', 'กรุณาเลือก Ward ที่ต้องการย้ายไป', 'error');
    if (!updatedBy)  return showAlert('saveAlert', 'กรุณาระบุชื่อผู้บันทึก', 'error');

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body  : JSON.stringify({ hn: selectedPatient.hn, an: selectedPatient.an, newWard, updatedBy }),
      });
      const data = await res.json();

      if (data.success) {
        showAlert('saveAlert', `✅ ${data.message}`, 'success');
        // อัปเดต selectedPatient
        selectedPatient.currentWard = newWard;
        document.getElementById('currentWardDisplay').value = newWard;
        // อัปเดต badge ใน list
        doSearch();
      } else {
        showAlert('saveAlert', `⚠️ ${data.message}`, 'error');
      }
    } catch (err) {
      showAlert('saveAlert', `❌ เชื่อมต่อ API ไม่ได้`, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '💾 บันทึกการย้าย Ward';
    }
  }

  // ── Transfer Log ─────────────────────────────────
  async function loadLog() {
    if (!selectedPatient) return;
    const el = document.getElementById('logContent');
    el.innerHTML = `<div class="loading"><div class="spinner"></div>กำลังโหลดประวัติ...</div>`;

    try {
      const res  = await fetch(`${API_URL}?action=log&an=${encodeURIComponent(selectedPatient.an)}`);
      const data = await res.json();

      if (!data.logs || data.logs.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>ยังไม่มีประวัติการย้าย Ward</p></div>`;
        return;
      }

      const rows = data.logs.map(l => `
        <tr>
          <td>${l.datetime}</td>
          <td>${l.fromWard || '-'}</td>
          <td class="arrow">→</td>
          <td><strong>${l.toWard}</strong></td>
          <td>${l.updatedBy}</td>
        </tr>`).join('');

      el.innerHTML = `
        <table class="log-table">
          <thead>
            <tr>
              <th>วันเวลา</th>
              <th>จาก Ward</th>
              <th></th>
              <th>ไป Ward</th>
              <th>บันทึกโดย</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch {
      el.innerHTML = `<div class="alert alert-error">❌ โหลดประวัติไม่ได้</div>`;
    }
  }

  // ── Tabs ─────────────────────────────────────────
  function switchTab(n) {
    [1, 2].forEach(i => {
      document.getElementById(`tabContent${i}`).style.display = i === n ? '' : 'none';
      document.getElementById(`tab${i}`).classList.toggle('active', i === n);
    });
    if (n === 2) loadLog();
  }

  // ── Helpers ──────────────────────────────────────
  function showAlert(id, msg, type) {
    document.getElementById(id).innerHTML =
      `<div class="alert alert-${type}" style="margin-top:12px">${msg}</div>`;
  }

  function formatDate(d) {
    if (!d) return '-';
    return String(d).split(' ')[0];
  }
</script>
</body>
</html>
